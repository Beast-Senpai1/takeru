<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>自己紹介ページ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
        }
        .container {
            background: white;
            width: 60%;
            margin: 50px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        h1 {
            color: #2c3e50;
        }
        img {
            width: 150px;
            border-radius: 50%;
            margin: 20px 0;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            margin: 10px 0;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        .btn:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>こんにちは！</h1>
    <img src="https://via.placeholder.com/150" alt="プロフィール画像">
    <p>はじめまして。〇〇です！</p>

    <h2>プロフィール</h2>
    <ul>
        <li>名前：〇〇</li>
        <li>出身：東京都</li>
        <li>趣味：音楽を聴くこと・ゲーム・スポーツ</li>
        <li>好きな教科：情報</li>
    </ul>

    <h2>メッセージ</h2>
    <p>
        プログラミングを勉強中です！<br>
        将来はIT関係の仕事に就きたいと思っています。
    </p>

    <a href="#" class="btn">お問い合わせ</a>
</div>

</body>
</html>
