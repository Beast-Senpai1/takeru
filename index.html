<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>2048風ゲーム</title>
<style>
  body { font-family: sans-serif; text-align: center; }
  #board { 
    display: grid; 
    grid-template-columns: repeat(4, 80px);
    grid-gap: 10px;
    justify-content: center;
    margin-top: 20px;
  }
  .tile {
    width: 80px;
    height: 80px;
    line-height: 80px;
    font-size: 24px;
    font-weight: bold;
    color: #333;
  }
</style>
</head>
<body>
<h1>2048風ゲーム</h1>
<div id="board"></div>
<script>
const size = 4;
let board = [];

function init() {
  board = Array.from({length: size}, () => Array(size).fill(0));
  addTile();
  addTile();
  draw();
}

function addTile() {
  let empty = [];
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (board[r][c] === 0) empty.push({r,c});
    }
  }
  if (empty.length === 0) return;
  let {r,c} = empty[Math.floor(Math.random()*empty.length)];
  board[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function getColor(value) {
  const colors = {
    0: "#cdc1b4",
    2: "#eee4da",
    4: "#ede0c8",
    8: "#f2b179",
    16: "#f59563",
    32: "#f67c5f",
    64: "#f65e3b",
    128: "#edcf72",
    256: "#edcc61",
    512: "#edc850",
    1024: "#edc53f",
    2048: "#edc22e"
  };
  return colors[value] || "#3c3a32";
}

function draw() {
  const boardDiv = document.getElementById("board");
  boardDiv.innerHTML = "";
  board.forEach(row => {
    row.forEach(cell => {
      const div = document.createElement("div");
      div.className = "tile";
      div.textContent = cell === 0 ? "" : cell;
      div.style.background = getColor(cell);
      div.style.color = cell <= 4 ? "#333" : "#fff";
      boardDiv.appendChild(div);
    });
  });
}

function slide(row) {
  let arr = row.filter(v => v);
  for (let i = 0; i < arr.length - 1; i++) {
    if (arr[i] === arr[i+1]) {
      arr[i] *= 2;
      arr[i+1] = 0;
    }
  }
  arr = arr.filter(v => v);
  while (arr.length < size) arr.push(0);
  return arr;
}

function rotate() {
  let newBoard = Array.from({length: size}, () => Array(size).fill(0));
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      newBoard[c][size-1-r] = board[r][c];
    }
  }
  board = newBoard;
}

function move(dir) {
  let moved = false;
  for (let i = 0; i < dir; i++) rotate();
  for (let r = 0; r < size; r++) {
    let newRow = slide(board[r]);
    if (board[r].toString() !== newRow.toString()) moved = true;
    board[r] = newRow;
  }
  for (let i = 0; i < (4 - dir) % 4; i++) rotate();
  if (moved) {
    addTile();
    draw();
  }
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") move(0);
  if (e.key === "ArrowUp") move(1);
  if (e.key === "ArrowRight") move(2);
  if (e.key === "ArrowDown") move(3);
});

init();
</script>
</body>
</html>
